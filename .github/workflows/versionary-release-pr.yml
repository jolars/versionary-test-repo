name: versionary-release-pr

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify config
        run: pnpm verify

      - name: Generate plan JSON
        id: plan
        run: |
          PLAN_JSON="$(pnpm -s plan)"
          echo "$PLAN_JSON"
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PLAN_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Skip when no release needed
        id: gate
        run: |
          RELEASE_TYPE="$(echo '${{ steps.plan.outputs.json }}' | jq -r '.releaseType')"
          if [ "$RELEASE_TYPE" = "null" ] || [ -z "$RELEASE_TYPE" ]; then
            echo "No releasable commits. Exiting."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Prepare release PR branch
        if: steps.gate.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm pr

      - name: Push release branch
        if: steps.gate.outputs.should_release == 'true'
        run: |
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          git push --force-with-lease origin "$BRANCH"

      - name: Open or update release PR
        if: steps.gate.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          TITLE="$(git log -1 --pretty=%s)"
          VERSION="${TITLE#chore(release): v}"
          BODY="Automated release PR for v${VERSION} generated by Versionary simple mode."

          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$BODY"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY"
          fi

          gh pr edit "$BRANCH" --add-label release || true
